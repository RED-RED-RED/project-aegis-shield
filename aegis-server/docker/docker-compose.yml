# docker/docker-compose.yml
# ============================================================
# AEGIS AEGIS Platform — full stack
#
# Services:
#   timescaledb  — PostgreSQL + TimescaleDB (time-series store)
#   mosquitto    — MQTT broker
#   aegis-server   — FastAPI backend + MQTT consumer
#   nginx        — Reverse proxy + React UI static files
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d
#   docker compose logs -f aegis-server
# ============================================================

version: "3.9"

services:

  # ---- TimescaleDB ----
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-ridmesh}
      POSTGRES_USER:     ${DB_USER:-ridmesh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"    # Remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ridmesh}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Mosquitto MQTT broker ----
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto_passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-u", "${MQTT_USER:-rid}", "-P", "${MQTT_PASSWORD:-changeme}", "-t", "health", "-m", "ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- FastAPI backend ----
  aegis-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      DB_HOST:       timescaledb
      DB_NAME:       ${DB_NAME:-ridmesh}
      DB_USER:       ${DB_USER:-ridmesh}
      DB_PASSWORD:   ${DB_PASSWORD:-changeme}
      MQTT_HOST:     mosquitto
      MQTT_PORT:     1883
      MQTT_USER:     ${MQTT_USER:-rid}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-changeme}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  # ---- Nginx (reverse proxy + static UI) ----
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - aegis-server
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../aegis-shield/dist:/usr/share/nginx/html:ro   # Built React app
    ports:
      - "80:80"

volumes:
  tsdb_data:
  mosquitto_data:
  mosquitto_log:
