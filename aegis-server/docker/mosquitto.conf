# docker/mosquitto.conf
# ============================================================
# Mosquitto MQTT broker configuration for AEGIS
# ============================================================

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ---- Listener: authenticated MQTT (nodes + server) ----
listener 1883
protocol mqtt
password_file /mosquitto/config/passwd
allow_anonymous false

# Retain LWT status messages so new subscribers get last known state
# (configured per-message by publishers, not broker-side)

# ---- Connection limits ----
max_connections 50
max_inflight_messages 20
max_queued_messages 1000
